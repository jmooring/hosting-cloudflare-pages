{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .GitInfo }}
    <p>Last Modified: {{ .AuthorDate.Format "Jan 2, 2006 3:04:05 PM" }}</p>
  {{ end }}

  {{ with .GetTerms "tags" }}
    <p>Tags:
      {{ range . }}
        <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      {{ end }}
    </p>
  {{ end }}

  <hr>
  {{ .Content }}
{{ end }}
